<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Age Eligibility | Digital Kingdom</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container animate">
        <h1>Age Eligibility</h1>
        <p class="subtitle">Enter an age from the test design table and click Verify.</p>

        <main>
            <label for="age">Age</label>
            <input id="age" type="text" inputmode="numeric" autocomplete="off" placeholder="Enter age (0-120)">

            <button id="verifyBtn" type="button">Verify</button>

            <div id="message" aria-live="polite">Eligible</div>
        </main>

        <a href="index.html" class="btn-redirect" style="display: inline-block; margin-top: 2rem;">Return to Portal</a>
    </div>

    <script src="subpage2.js"></script>
</body>

</html>
