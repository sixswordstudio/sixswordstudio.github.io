<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grade Calculator</title>
</head>

<body>
    <main>
        <h1>Grade Calculator</h1>
        <p>Enter the three scores from the test design table and click Calculate.</p>

        <label>
            Assignment Score
            <input id="assignment" type="text" inputmode="decimal" autocomplete="off">
        </label>

        <label>
            Midterm Score
            <input id="midterm" type="text" inputmode="decimal" autocomplete="off">
        </label>

        <label>
            Final Exam Score
            <input id="finalExam" type="text" inputmode="decimal" autocomplete="off">
        </label>

        <button id="calculateBtn" type="button">Calculate</button>

        <div id="message" aria-live="polite">Final Score: 0.00, Grade: F</div>
    </main>

    <script src="subpage1.js"></script>
</body>

</html>
