<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grade Calculator | Digital Kingdom</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container animate">
        <h1>Grade Calculator</h1>
        <p class="subtitle">Enter the three scores from the test design table and click Calculate.</p>

        <main>
            <label for="assignment">Assignment Score</label>
            <input id="assignment" type="text" inputmode="decimal" autocomplete="off" placeholder="Enter assignment score">

            <label for="midterm">Midterm Score</label>
            <input id="midterm" type="text" inputmode="decimal" autocomplete="off" placeholder="Enter midterm score">

            <label for="finalExam">Final Exam Score</label>
            <input id="finalExam" type="text" inputmode="decimal" autocomplete="off" placeholder="Enter final exam score">

            <button id="calculateBtn" type="button">Calculate</button>

            <div id="message" aria-live="polite">Final Score: 0.00, Grade: F</div>
        </main>

        <a href="index.html" class="btn-redirect" style="display: inline-block; margin-top: 2rem;">Return to Portal</a>
    </div>

    <script src="subpage1.js"></script>
</body>

</html>
